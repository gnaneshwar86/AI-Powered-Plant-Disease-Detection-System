<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <!-- Meta SEO Tags -->
    <meta name="description" content="Production-grade AI Plant Disease Detection. Diagnose crop leaf anomalies instantly using deep learning with heatmaps and actionable remedies.">
    <meta name="keywords" content="MLOps, Plant Disease Detection, Computer Vision, Pytorch, Flask, Grad-CAM, ResNet50, EfficientNet">
    
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/ionicons/2.0.1/css/ionicons.min.css">
    
    <title>{% block pagetitle %}{% endblock pagetitle %} | LeafAI Crop Doctor</title>
    
    <style>
        :root {
            --primary-grad: linear-gradient(135deg, #0d3822 0%, #05160e 100%);
            --accent-green: #3cd070;
            --accent-hover: #2eb25c;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary-grad);
            background-attachment: fixed;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
        }

        h1, h2, h3, h4, h5, h6, .brand-font {
            font-family: 'Outfit', sans-serif;
        }

        /* Glassmorphic Navbar */
        .navbar-custom {
            background: rgba(13, 31, 22, 0.7) !important;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--accent-green) !important;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-link {
            color: var(--text-light) !important;
            font-weight: 500;
            padding: 0.5rem 1.2rem !important;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent-green) !important;
            background: rgba(255, 255, 255, 0.05);
        }

        /* Main Content wrapper */
        .content-wrapper {
            flex: 1 0 auto;
            padding: 3rem 0;
        }

        /* Glassmorphic Cards */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 2rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(60, 208, 112, 0.4);
        }

        /* Primary Action Buttons */
        .btn-premium {
            background: var(--accent-green);
            color: #05160e;
            font-weight: 600;
            border-radius: 12px;
            padding: 0.75rem 2rem;
            border: none;
            transition: all 0.25s ease;
            box-shadow: 0 4px 14px 0 rgba(60, 208, 112, 0.3);
        }

        .btn-premium:hover {
            background: var(--accent-hover);
            color: #05160e;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px 0 rgba(60, 208, 112, 0.45);
        }

        .btn-premium-outline {
            background: transparent;
            color: var(--accent-green);
            font-weight: 600;
            border-radius: 12px;
            padding: 0.75rem 2rem;
            border: 2px solid var(--accent-green);
            transition: all 0.25s ease;
        }

        .btn-premium-outline:hover {
            background: var(--accent-green);
            color: #05160e;
            transform: translateY(-2px);
            box-shadow: 0 4px 14px 0 rgba(60, 208, 112, 0.3);
        }

        /* Footer */
        .footer-custom {
            background: #05100b;
            border-top: 1px solid var(--glass-border);
            padding: 3rem 0;
            margin-top: auto;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .footer-custom a {
            color: var(--text-light);
            text-decoration: none;
            transition: color 0.2s ease;
        }

        .footer-custom a:hover {
            color: var(--accent-green);
        }

        .footer-socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 1.5rem;
        }

        .footer-socials a {
            font-size: 1.4rem;
            width: 40px;
            height: 40px;
            display: grid;
            place-items: center;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            transition: all 0.2s ease;
        }

        .footer-socials a:hover {
            background: var(--accent-green);
            color: #05160e;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <!-- Premium Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="ion-leaf text-accent"></i>
                <span>LeafAI<span style="color: var(--text-light); font-weight: 300;">Diagnostics</span></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link" href="/" id="nav-home">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/index" id="nav-engine">AI Engine</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/market" id="nav-market">Supplements</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contact" id="nav-contact">Contact Us</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content Wrapper -->
    <div class="content-wrapper">
        <div class="container">
            {% block body %}
            {% endblock body %}
        </div>
    </div>

    <!-- Production Grade Footer -->
    <footer class="footer-custom">
        <div class="container text-center">
            <div class="footer-socials">
                <a href="mailto:support@leafai.example.com"><i class="ion-email"></i></a>
                <a href="https://linkedin.com" target="_blank"><i class="ion-social-linkedin"></i></a>
                <a href="https://github.com" target="_blank"><i class="ion-social-github"></i></a>
            </div>
            <ul class="list-inline mb-3">
                <li class="list-inline-item mx-3"><a href="/">Home</a></li>
                <li class="list-inline-item mx-3"><a href="/index">AI Diagnostic Engine</a></li>
                <li class="list-inline-item mx-3"><a href="/market">Treatment Center</a></li>
                <li class="list-inline-item mx-3"><a href="/contact">Support</a></li>
            </ul>
            <p class="mb-0 text-muted">&copy; 2026 LeafAI Diagnostics Corp. Certified MLOps Plant Disease Classification System.</p>
        </div>
    </footer>

    <!-- Bootstrap JS with Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Automatically highlight active navigation link based on current path
        const currentPath = window.location.pathname;
        if (currentPath === '/' || currentPath === '') {
            document.getElementById('nav-home').classList.add('active');
        } else if (currentPath.includes('/index') || currentPath.includes('/submit')) {
            document.getElementById('nav-engine').classList.add('active');
        } else if (currentPath.includes('/market')) {
            document.getElementById('nav-market').classList.add('active');
        } else if (currentPath.includes('/contact')) {
            document.getElementById('nav-contact').classList.add('active');
        }
    </script>
</body>
</html>
