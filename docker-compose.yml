version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: leafai-detector:latest
    container_name: leafai_web
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MODEL_NAME=efficientnet_b0
      - MODEL_WEIGHTS_PATH=/app/plant_disease_model_latest.pt
    volumes:
      - ./static/uploads:/app/static/uploads
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: leafai_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped
